function insidePoly(x,z){
  let inside=false;
  for(let i=0,j=OUTLINE.length-1;i<OUTLINE.length;j=i++){
    const [xi,zi]=OUTLINE[i],[xj,zj]=OUTLINE[j];
    if(((zi>z)!==(zj>z)) && (x < (xj-xi)*(z-zi)/(zj-zi)+xi)) inside=!inside;
  }
  return inside;
}
function distToPoly(x,z){
  let d=Infinity;
  for(let i=0,j=OUTLINE.length-1;i<OUTLINE.length;j=i++){
    const [x1,z1]=OUTLINE[j],[x2,z2]=OUTLINE[i];
    const dx=x2-x1,dz=z2-z1,L2=dx*dx+dz*dz;
    let t=((x-x1)*dx+(z-z1)*dz)/L2; t=Math.max(0,Math.min(1,t));
    const px=x1+t*dx-x, pz=z1+t*dz-z;
    d=Math.min(d,px*px+pz*pz);
  }
  return Math.sqrt(d);
}
// value-noise fbm
function hash(ix,iz){let n=ix*374761393+iz*668265263;n=(n^(n>>13))*1274126177;return((n^(n>>16))>>>0)/4294967295;}
function vnoise(x,z){
  const ix=Math.floor(x),iz=Math.floor(z),fx=x-ix,fz=z-iz;
  const sx=fx*fx*(3-2*fx),sz=fz*fz*(3-2*fz);
  const a=hash(ix,iz),b=hash(ix+1,iz),c=hash(ix,iz+1),d=hash(ix+1,iz+1);
  return a+(b-a)*sx+(c-a)*sz+(a-b-c+d)*sx*sz;
}
function fbm(x,z){let v=0,a=0.5,f=1;for(let o=0;o<4;o++){v+=a*vnoise(x*f,z*f);a*=0.5;f*=2;}return v;}
function gauss(x,z,cx,cz,amp,sig){const dx=x-cx,dz=z-cz;return amp*Math.exp(-(dx*dx+dz*dz)/(2*sig*sig));}

// hill bumps: [x, z, amplitude, sigma] — Big Buddha, Karon viewpoint, Khao Rang, Promthep cliff, central spine helpers
const HILLS=[[-36.6,143.7,13,15.0],[-42.5,183.4,10,12.0],[22.4,81.8,6,9.0],[-37.5,207.0,7,13.5]];
// west mountain range (Mai Thao Sip Song) as line segments [x1,z1,x2,z2,amp,sigma];
// gap at z=38..60 is the real Patong pass; Thalang and Chalong plains stay low
const RIDGES=[[-39.0,-78.0,-33.0,-7.5,15,13.5],[-30.0,-7.5,-31.5,57.0,17,13.5],[-37.5,90.0,-39.0,138.0,17,13.5],[-39.0,138.0,-36.0,180.0,14,12.0]];
function segDist(x,z,x1,z1,x2,z2){
  const dx=x2-x1,dz=z2-z1,t=Math.max(0,Math.min(1,((x-x1)*dx+(z-z1)*dz)/(dx*dx+dz*dz)));
  return Math.hypot(x1+t*dx-x,z1+t*dz-z);
}

function rawHeight(x,z){
  const d = distToPoly(x,z) * (insidePoly(x,z)?1:-1);
  if(d<=0) return Math.max(-5, d*0.35);
  let h = Math.min(d,8)/8*2.5;                       // beach rise
  const mask = Math.min(Math.max((d-3)/22,0),1);
  h += fbm(x*0.03+7,z*0.03+3) * mask * 3;            // gentle lowland undulation
  for(const [x1,z1,x2,z2,a,s] of RIDGES){const dd=segDist(x,z,x1,z1,x2,z2); h += a*Math.exp(-dd*dd/(2*s*s))*mask;}
  for(const [cx,cz,a,s] of HILLS) h += gauss(x,z,cx,cz,a,s)*Math.min(Math.max(d/6,0),1);
  return h;
}


// flat pads so landmark structures sit on level ground
const FLATS=[[-39,-140],[-39,-160],[-16,187],[-36.6,143.7],[-12.9,127.6],[-37.5,207.0],[-49.8,76.3],[33.9,89.6],[-42.5,183.4],[-53.1,-11.2],[22.4,81.8],[-18,-175]];
const padH=FLATS.map(f=>rawHeight(f[0],f[1]));
function terrainHeight(x,z){
  let h=rawHeight(x,z);
  for(let i=0;i<FLATS.length;i++){
    const d=Math.hypot(x-FLATS[i][0],z-FLATS[i][1]);
    if(d<14){const t=d<8?1:1-(d-8)/6; h=h*(1-t)+padH[i]*t;}
  }
  return h;
}

// heightmap grid (also fed to the ocean shader for shore foam)
const HM_W=256, HM_H=256, HM_X0=-120, HM_Z0=-262, HM_SX=240, HM_SZ=525;
const heightData = new Float32Array(HM_W*HM_H);
for(let j=0;j<HM_H;j++)for(let i=0;i<HM_W;i++){
  heightData[j*HM_W+i]=terrainHeight(HM_X0+i/(HM_W-1)*HM_SX, HM_Z0+j/(HM_H-1)*HM_SZ);
}
function heightAt(x,z){ // bilinear sample — used instead of raycasts
  const u=(x-HM_X0)/HM_SX*(HM_W-1), v=(z-HM_Z0)/HM_SZ*(HM_H-1);
  const i=Math.max(0,Math.min(HM_W-2,Math.floor(u))), j=Math.max(0,Math.min(HM_H-2,Math.floor(v)));
  const fu=u-i, fv=v-j, g=(a,b)=>heightData[b*HM_W+a];
  return g(i,j)*(1-fu)*(1-fv)+g(i+1,j)*fu*(1-fv)+g(i,j+1)*(1-fu)*fv+g(i+1,j+1)*fu*fv;
}

// ============================ RENDERER =============================
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x8fd6f2);
scene.fog=new THREE.Fog(0xbfe6f5,220,650);
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1500);

scene.add(new THREE.HemisphereLight(0xcfeaff,0x6a9c58,0.9));
const sun=new THREE.DirectionalLight(0xfff3d6,1.6); sun.position.set(80,140,-60); scene.add(sun);

// ========================= TOON MATERIALS ==========================
const grad=new THREE.DataTexture(new Uint8Array([90,170,255]),3,1,THREE.RedFormat);
grad.minFilter=grad.magFilter=THREE.NearestFilter; grad.needsUpdate=true;
const toon=c=>new THREE.MeshToonMaterial({color:c,gradientMap:grad});
function addOutline(mesh,scale=1.05){
  const o=new THREE.Mesh(mesh.geometry,new THREE.MeshBasicMaterial({color:0x1a2530,side:THREE.BackSide}));
  o.scale.setScalar(scale); mesh.add(o); return mesh;
}

// ========================= TERRAIN MESH ============================
{
  const geo=new THREE.PlaneGeometry(HM_SX,HM_SZ,200,300);
  geo.rotateX(-Math.PI/2);
  geo.translate(0,0,HM_Z0+HM_SZ/2); // align plane with heightmap bounds
  const pos=geo.attributes.position, colors=[];
  const sand=new THREE.Color(0xeeddaa), grass=new THREE.Color(0x5cb551),
        dark=new THREE.Color(0x3f9346), sea=new THREE.Color(0xc9c09b);
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i), z=pos.getZ(i);
    const h=terrainHeight(x,z);
    pos.setY(i,h);
    let c = h<1.4?sand : h<7?grass : h<15?dark : new THREE.Color(0x6f7f5e);
    if(h<0.1)c=sea;
    const shade=0.9+fbm(x*0.15,z*0.15)*0.2;
    colors.push(c.r*shade,c.g*shade,c.b*shade);
  }
  geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
  geo.computeVertexNormals();
  const mat=new THREE.MeshToonMaterial({vertexColors:true,gradientMap:grad});
  scene.add(new THREE.Mesh(geo,mat));
}

// ========================== OCEAN SHADER ===========================
const heightTex=new THREE.DataTexture(heightData,HM_W,HM_H,THREE.RedFormat,THREE.FloatType);
heightTex.minFilter=heightTex.magFilter=THREE.LinearFilter; heightTex.needsUpdate=true;
const oceanUniforms={
  uTime:{value:0}, uHeight:{value:heightTex},
  uHm:{value:new THREE.Vector4(HM_X0,HM_Z0,HM_SX,HM_SZ)},
  ...THREE.UniformsLib.fog
};
const ocean=new THREE.Mesh(
  new THREE.PlaneGeometry(2000,2000,140,140).rotateX(-Math.PI/2),
  new THREE.ShaderMaterial({
    uniforms:oceanUniforms, fog:true, transparent:false,
    vertexShader:`
      uniform float uTime; varying vec3 vW;
      #include <fog_pars_vertex>
      void main(){
        vec3 p=position;
        p.y += sin(p.x*0.08+uTime)*0.25 + sin(p.z*0.06+uTime*1.3)*0.25;
        vec4 mvPosition = modelViewMatrix*vec4(p,1.0);
        vW=(modelMatrix*vec4(p,1.0)).xyz;
        gl_Position = projectionMatrix*mvPosition;
        #include <fog_vertex>
      }`,
    fragmentShader:`
      uniform float uTime; uniform sampler2D uHeight; uniform vec4 uHm;
      varying vec3 vW;
      #include <fog_pars_fragment>
      float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
      float noise(vec2 p){
        vec2 i=floor(p),f=fract(p); f=f*f*(3.-2.*f);
        return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
      }
      void main(){
        vec2 uv=(vW.xz-uHm.xy)/uHm.zw;
        float h = (uv.x>0.0&&uv.x<1.0&&uv.y>0.0&&uv.y<1.0) ? texture2D(uHeight,uv).r : -6.0;
        // deep vs shallow — Wind Waker light blue
        vec3 deep=vec3(0.16,0.47,0.72), shallow=vec3(0.35,0.75,0.80);
        vec3 col=mix(deep,shallow,smoothstep(-6.0,-0.5,h));
        // drifting contour swirls
        float n=noise(vW.xz*0.045+vec2(uTime*0.04,uTime*0.025))
               +0.5*noise(vW.xz*0.11-vec2(uTime*0.03,0.0));
        float band=smoothstep(0.86,0.90,n)-smoothstep(0.96,1.0,n);
        col=mix(col,vec3(0.92,0.98,1.0),band*0.9);
        // animated shoreline foam
        float shore=smoothstep(-2.2,-0.1,h)*(1.0-smoothstep(0.0,0.4,h));
        float pulse=0.5+0.5*sin(uTime*1.8 - h*4.0 + noise(vW.xz*0.3)*3.0);
        col=mix(col,vec3(1.0),clamp(shore*(0.45+0.55*pulse),0.0,1.0));
        gl_FragColor=vec4(col,1.0);
        #include <fog_fragment>
      }`
  })
);
scene.add(ocean);
const waveY=(x,z,t)=>Math.sin(x*0.08+t)*0.25+Math.sin(z*0.06+t*1.3)*0.25;

// ============================= CLOUDS ==============================
const clouds=[];
for(let i=0;i<10;i++){
  const g=new THREE.Group();
  for(let k=0;k<3;k++){
    const m=new THREE.Mesh(new THREE.IcosahedronGeometry(6+Math.random()*5,1),
      new THREE.MeshToonMaterial({color:0xffffff,gradientMap:grad}));
    m.position.set(k*7-7+Math.random()*3,Math.random()*2,Math.random()*4);
    m.scale.y=0.45; g.add(m);
  }
  g.position.set(Math.random()*900-450,60+Math.random()*30,Math.random()*900-450);

function buildPier(x,z,dx,dz,len){
  const p=new THREE.Group(), ang=Math.atan2(dx,dz);
  const deck=new THREE.Mesh(new THREE.BoxGeometry(2.2,0.3,len),toon(0xa07a4e));
  deck.position.y=1.2; p.add(deck);
  for(let i=0;i<len/4;i++)for(const s of [-1,1]){
    const post=new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.14,2.6,5),toon(0x7a5a36));
    post.position.set(s*0.9,-0.1,i*4-len/2+2); p.add(post);
  }
  p.rotation.y=ang;
  p.position.set(x+dx*len/2,0,z+dz*len/2);
  scene.add(p); return p;
}

function taperStern(geo,k){ // pull hull sides inward toward the stern (z<0)
  const p=geo.attributes.position;
  for(let i=0;i<p.count;i++){const z=p.getZ(i);if(z<0)p.setX(i,p.getX(i)*(1+z*k));}
  geo.computeVertexNormals(); return geo;
}
function rope(x1,y1,z1,x2,y2,z2){
  const v=new THREE.Vector3(x2-x1,y2-y1,z2-z1), L=v.length();
  const m=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,L,4),new THREE.MeshBasicMaterial({color:0x3a2a18}));
  m.position.set((x1+x2)/2,(y1+y2)/2,(z1+z2)/2);
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),v.normalize());
  return m;
}
function makeBoat(hullCol,sailCol){

  const hull=addOutline(new THREE.Mesh(taperStern(new THREE.BoxGeometry(2.2,1,5.5,1,1,4),0.08),toon(hullCol)),1.04);

  const gun=new THREE.Mesh(taperStern(new THREE.BoxGeometry(2.35,0.14,5.6,1,1,4),0.08),toon(0x6b4028)); // gunwale strip
  gun.position.y=1.03;
  const prow=new THREE.Mesh(new THREE.ConeGeometry(1.05,2,4),toon(hullCol));
  prow.rotation.set(-Math.PI/2,0,Math.PI/4); prow.position.set(0,0.55,3.6);
  const mast=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.12,5.5,6),toon(0x7a4a28)); mast.position.y=3.2;
  const boom=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,3.3,5),toon(0x7a4a28));
  boom.rotation.z=Math.PI/2; boom.position.set(0,1.7,-0.35);
  const sailGeo=new THREE.PlaneGeometry(3.2,3.8,6,3); // curved sail: billow the middle
  {const p=sailGeo.attributes.position;
   for(let i=0;i<p.count;i++){const u=p.getX(i)/3.2+0.5;p.setZ(i,Math.sin(u*Math.PI)*0.45);}
   sailGeo.computeVertexNormals();}
  const sail=new THREE.Mesh(sailGeo,new THREE.MeshToonMaterial({color:sailCol,gradientMap:grad,side:THREE.DoubleSide}));
  sail.position.set(0,3.5,-0.35);
  const rudder=new THREE.Mesh(new THREE.BoxGeometry(0.14,1.1,0.7),toon(0x5a3222)); rudder.position.set(0,0.15,-2.95);
  b.add(hull,gun,prow,mast,boom,sail,rudder,
    rope(0,5.9,0,0,1.1,3.3),rope(0,5.9,0,0,1.1,-2.6),rope(1.6,3.5,-0.35,0,1.05,-2.4));
  return b;

let actx=null;
function initAudio(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); }
function chime(notes,step=0.13){
  if(!actx)return;
  notes.forEach((f,i)=>{
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='triangle'; o.frequency.value=f;
    const t=actx.currentTime+i*step;
    g.gain.setValueAtTime(0.0,t); g.gain.linearRampToValueAtTime(0.25,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    o.connect(g).connect(actx.destination); o.start(t); o.stop(t+0.6);
  });
}

const clock=new THREE.Clock();
let t=0, mmTimer=0, runT=0;
// intro fly-in
const INTRO_LEN=6, AERIAL=new THREE.Vector3(45,480,180), ISLAND_CENTER=new THREE.Vector3(0,0,0);
let introT=0;
camera.position.copy(AERIAL); camera.lookAt(ISLAND_CENTER);
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05); t+=dt;
  oceanUniforms.uTime.value=t;

  // movement input, camera-relative
  let mx=0,mz=0;
  if(keys.KeyW)mz-=1; if(keys.KeyS)mz+=1; if(keys.KeyA)mx-=1; if(keys.KeyD)mx+=1;

  if(!sailing){
    const moving=mx||mz;
    const shift=keys.ShiftLeft||keys.ShiftRight;
    if(moving&&shift)runT+=dt; else runT=Math.max(0,runT-dt*2);
    const swimming=heightAt(player.position.x,player.position.z)<-0.6&&pierY(player.position.x,player.position.z)===null;
    const speed=(swimming?4.5:10)*(shift&&moving?(runT<4?1.8:1.35):1); // sprint, tires into half-run after 4s
    if(moving){
      const ang=Math.atan2(mx,mz)+camYaw; // W = away from camera
      const nx=player.position.x+Math.sin(ang)*speed*dt, nz=player.position.z+Math.cos(ang)*speed*dt;
      player.position.x=nx; player.position.z=nz; // walk, wade or swim anywhere
      player.rotation.y=ang;
    }
    const pier=pierY(player.position.x,player.position.z);
    const ground=swimming
      ? waveY(player.position.x,player.position.z,t)-0.95
      : Math.max(heightAt(player.position.x,player.position.z),pier!==null?pier:-0.45,-0.45);
    if(keys.Space&&!airborne&&!swimming){vy=9;airborne=true;}
    if(airborne){
      player.position.y+=vy*dt; vy-=26*dt;
      if(player.position.y<=ground){player.position.y=ground;airborne=false;vy=0;}
    } else player.position.y=ground;
    // vehicles are entered only with E (see toggleBoat) — no auto-board
    // blob shadow stays on the ground, shrinks with jump height
    const jumpH=player.position.y-ground;
    blob.position.y=ground-player.position.y+0.06;
    blob.scale.setScalar(Math.max(0.55,1-jumpH*0.1));
    blob.visible=!swimming;
    const sw=moving?Math.sin(t*(shift?(runT<4?16:13):11)):0;
    armL.rotation.x=sw*0.8; armR.rotation.x=-sw*0.8;
    legL.rotation.x=-sw*0.8; legR.rotation.x=sw*0.8;
    body.position.y=1.15+(moving?Math.abs(Math.sin(t*11))*0.08:Math.sin(t*2)*0.03);
  } else {
    if(keys.KeyW)boatSpeed=Math.min(boatSpeed+activeBoat.userData.acc*dt,activeBoat.userData.max);
    else if(keys.KeyS)boatSpeed=Math.max(boatSpeed-16*dt,-4);
    else boatSpeed*=(1-1.2*dt);
    if(mx)activeBoat.rotation.y-=mx*1.4*dt*(boatSpeed>=0?1:-1);
    const nx=activeBoat.position.x+Math.sin(activeBoat.rotation.y)*boatSpeed*dt,
          nz=activeBoat.position.z+Math.cos(activeBoat.rotation.y)*boatSpeed*dt;
    const land=activeBoat.userData.land;
    if(land ? heightAt(nx,nz)>0.3 : heightAt(nx,nz)<-0.5){ activeBoat.position.x=nx; activeBoat.position.z=nz; } else boatSpeed*=0.4;
    if(land){
      activeBoat.position.y=heightAt(activeBoat.position.x,activeBoat.position.z)+0.1;
      activeBoat.rotation.z=0; activeBoat.rotation.x=0;
    } else {
      activeBoat.position.y=0.3+waveY(activeBoat.position.x,activeBoat.position.z,t);
      activeBoat.rotation.z=Math.sin(t*1.7)*0.04+(mx?-mx*0.08:0);
      activeBoat.rotation.x=Math.sin(t*1.3)*0.03-boatSpeed*0.004;
    }
    if(!activeBoat.userData.land&&Math.abs(boatSpeed)>4&&Math.random()<dt*14)
      spawnWake(activeBoat.position.x-Math.sin(activeBoat.rotation.y)*2.5,activeBoat.position.z-Math.cos(activeBoat.rotation.y)*2.5);
  }
  // idle boats bob on the waves
  for(const b of ALL_BOATS) if(!(sailing&&b===activeBoat)) b.position.y=0.3+waveY(b.position.x,b.position.z,t)*0.6;
  // wake update
  for(let i=wakes.length-1;i>=0;i--){
    const w=wakes[i]; w.userData.age+=dt;
    w.scale.setScalar(1.5+w.userData.age*3); w.material.opacity=0.8*(1-w.userData.age/1.4);
    if(w.userData.age>1.4){scene.remove(w);w.material.dispose();wakes.splice(i,1);}
  }
  // seagulls circle their piers
  for(const s of gulls){
    const a=t*s.sp+s.ph;
    s.gl.position.set(s.cx+Math.cos(a)*s.R, s.h+Math.sin(t*1.7+s.ph)*0.7, s.cz+Math.sin(a)*s.R);
    s.gl.rotation.y=-a+(s.sp>0?0:Math.PI);
    const flap=Math.sin(t*9+s.ph)*0.55;
    s.gl.userData.wL.rotation.z=flap; s.gl.userData.wR.rotation.z=Math.PI-flap;
  }
  // cute wildlife idle
  for(const a of ANIMALS){
    const m=a.mesh, ph=a.phase, ud=m.userData;
    if(a.sea){ // bob on the waves + gentle drift heading
      m.position.y=waveY(a.x,a.z,t)*0.6-0.1+Math.sin(t*1.4+ph)*0.05;
      m.rotation.z=Math.sin(t*1.1+ph)*0.12;
      if(ud.tail)ud.tail.rotation.y=Math.sin(t*6+ph)*0.5; // fish/dolphin/shark tail
      if(ud.dorsal)m.position.y+=Math.sin(t*3+ph)*0.04; // dolphins ride a little livelier
      if(ud.wingL&&ud.wingR){const f=Math.sin(t*2+ph)*0.35; ud.wingL.rotation.z=f; ud.wingR.rotation.z=-f;} // manta flap
    }else{ // land critters: subtle breathing bob
      m.position.y=a.baseY??(a.baseY=m.position.y); m.position.y=a.baseY+Math.sin(t*2+ph)*0.06;
      if(ud.trunk)ud.trunk.rotation.z=Math.sin(t*1.3+ph)*0.08; // elephant trunk sway
      if(ud.tail&&ud.head)ud.tail.rotation.z=Math.sin(t*2.5+ph)*0.15; // monkey/buffalo tail flick
      if(ud.wingL&&ud.wingR&&ud.head)ud.head.rotation.y=Math.sin(t*1.2+ph)*0.2; // hornbill head bob
    }
  }
  // clouds drift
  for(const c of clouds){ c.position.x+=dt*2; if(c.position.x>500)c.position.x=-500; }

  // camera follow
  const focus=sailing?boat.position:player.position;
  const cx=focus.x+Math.sin(camYaw)*Math.cos(camPitch)*camDist,
        cz=focus.z+Math.cos(camYaw)*Math.cos(camPitch)*camDist;
  let cy=focus.y+Math.sin(camPitch)*camDist+2;
  for(let s=0.3;s<=1.001;s+=0.35) // keep the sight line above ridges
    cy=Math.max(cy,heightAt(focus.x+(cx-focus.x)*s,focus.z+(cz-focus.z)*s)+2);
  cy=Math.max(cy,1.2);
  if(introT<INTRO_LEN){ // aerial fly-in: whole Phuket, then descend to the player
    if(started)introT+=dt; // hold on the aerial view behind the title until the player begins
    const k=Math.min(introT/INTRO_LEN,1), e=k*k*(3-2*k);
    scene.fog.far=650+(1-e)*600; // don't fog out the island during the aerial view
    camera.position.lerpVectors(AERIAL,new THREE.Vector3(cx,cy,cz),e);
    camera.position.y=Math.max(camera.position.y,heightAt(camera.position.x,camera.position.z)+2);
    const look=new THREE.Vector3().lerpVectors(ISLAND_CENTER,new THREE.Vector3(focus.x,focus.y+2.5,focus.z),e);
    camera.lookAt(look);
  } else {
    if(!uiEl.classList.contains('ready'))uiEl.classList.add('ready'); // reveal HUD once the fly-in lands
    camera.position.lerp(new THREE.Vector3(cx,cy,cz),Math.min(1,dt*6));
    camera.lookAt(focus.x,focus.y+2.5,focus.z);
  }

  checkDiscoveries();
  if((mmTimer+=dt)>0.2){drawMinimap();mmTimer=0;}
  renderer.render(scene,camera);
}
animate();
// ponytail: debug handle for automated smoke test
window.__dbg={player,boat,get sailing(){return sailing},LANDMARKS,renderer,scene,camera,THREE,
  skipIntro(){startGame();introT=INTRO_LEN;}}; // test hook: dismiss title + fast-forward fly-in
</script>
</body>
